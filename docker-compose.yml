version: '3.8'

services:
  web:
    image: nginx:latest
    ports:
      - "8080:8080" # Conforme o diagrama: porta 8080 do host mapeada para 8080 do container web
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./web-data:/usr/share/nginx/html # Volume web-data (arquivos públicos)
    depends_on:
      - app

  app:
    build: .
    # A porta 80 é exposta internamente para o Nginx (não vai para o host)
    volumes:
      - ./app-code:/var/www/html # Volume app-code (código da aplicação)
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    volumes:
      - db-data:/var/lib/mysql # Volume db-data (banco de dados)
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db-data: # Volume gerenciado pelo Docker para não perder os dados do BD